<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* CSS Custom Properties: Dark-mode only, high-contrast accents */
    :root {
      --bg: #0a0a0f;
      --glass-bg: rgba(20, 25, 40, 0.6);
      --glass-border: rgba(108, 99, 255, 0.3);
      --glass-blur: blur(20px);
      --border: rgba(46, 50, 80, 0.5);
      --accent: #7c3aed; /* High-contrast purple */
      --accent-glow: rgba(124, 58, 237, 0.5);
      --on-green: #10b981;
      --on-glow: rgba(16, 185, 129, 0.4);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --mono-font: 'Fira Code', monospace;
      --radius: 20px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Reset & Base: Mobile-first, handheld feel */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 16px; /* Base for mobile */
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* Sticky Header: Minimal, high-contrast */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-title { font-size: 1.5rem; font-weight: 700; }
    .header-actions { display: flex; gap: 0.5rem; }
    .btn-icon {
      padding: 0.75rem; border-radius: 12px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      font-size: 1rem; transition: all var(--transition);
      backdrop-filter: var(--glass-blur);
    }
    .btn-icon:hover { background: var(--glass-border); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* Bento Grid: Mobile-first stacked, responsive to varied boxes */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      padding: 1.5rem 1rem;
      max-width: 480px; margin: 0 auto;
    }
    @media (min-width: 600px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
        max-width: none;
      }
      .bento-1-1 { grid-column: span 1; grid-row: span 1; }
      .bento-1-2 { grid-column: span 1; grid-row: span 2; }
      .bento-2-1 { grid-column: span 2; grid-row: span 1; }
    }
    @media (min-width: 900px) {
      .bento-grid { padding: 2rem; gap: 1.5rem; }
    }

    /* Glassmorphism Cards: Varied bento sizes, minimalist */
    .card {
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow);
      transition: all var(--transition);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }
    .card.powered {
      border-color: var(--on-green);
      box-shadow: 0 0 0 2px var(--on-glow), var(--shadow);
    }
    .card:hover { transform: translateY(-4px); }

    /* Card Header: Compact, monospace accents */
    .card-header { display: flex; align-items: center; gap: 0.75rem; }
    .zone-icon-btn {
      font-size: 2rem; background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; width: 3rem; height: 3rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); backdrop-filter: var(--glass-blur);
    }
    .zone-icon-btn:hover { background: var(--glass-border); }
    .zone-name-input {
      flex: 1; background: transparent; border: none;
      font-family: var(--mono-font); font-size: 1.1rem; font-weight: 600;
      color: var(--text); outline: none; border-bottom: 2px solid transparent;
      transition: border-color var(--transition); padding-bottom: 0.25rem;
    }
    .zone-name-input:focus { border-bottom-color: var(--accent); }
    .power-btn {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); backdrop-filter: var(--glass-blur);
    }
    .power-btn.on {
      background: var(--on-green); border-color: var(--on-green); color: #000;
      box-shadow: 0 0 20px var(--on-glow);
    }

    /* Controls: Monospace for tech details, high-contrast */
    .zone-source, .vol-display {
      width: 100%; padding: 0.75rem;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text);
      font-family: var(--mono-font); font-size: 1rem; font-weight: 500;
      outline: none; cursor: pointer; transition: all var(--transition);
      backdrop-filter: var(--glass-blur);
    }
    .zone-source:focus, .vol-display { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .vol-display { text-align: center; color: var(--accent); font-weight: 600; font-size: 1.2rem; }
    .vol-row { display: flex; align-items: center; gap: 0.75rem; }
    .vol-label {
      font-family: var(--mono-font); font-size: 0.85rem; color: var(--text-muted);
      width: 2.5rem; text-align: right; font-weight: 500;
    }
    .vol-btn {
      width: 2.5rem; height: 2.5rem; border-radius: 12px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); backdrop-filter: var(--glass-blur);
    }
    .vol-btn:hover { background: var(--glass-border); }
    .vol-btn:active { box-shadow: 0 0 0 3px var(--accent-glow); }

    /* Status Chip: Minimal accent */
    .status-chip {
      font-family: var(--mono-font); font-size: 0.8rem; padding: 0.4rem 0.8rem;
      border-radius: 20px; background: var(--glass-bg);
      color: var(--text-muted); font-weight: 500; backdrop-filter: var(--glass-blur);
    }
    .status-chip.on { background: var(--on-glow); color: var(--on-green); }

    /* Modals & Pickers: Glassmorphism overlays */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; z-index: 300; padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 420px;
      box-shadow: var(--shadow); backdrop-filter: var(--glass-blur);
    }
    .emoji-picker {
      position: fixed; background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 1rem;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(2.5rem, 1fr)); gap: 0.5rem;
      box-shadow: var(--shadow); z-index: 200; width: 260px; backdrop-filter: var(--glass-blur);
    }
    .emoji-picker.hidden { display: none; }
    .emoji-opt {
      font-size: 1.5rem; padding: 0.5rem; border-radius: 12px; cursor: pointer;
      transition: background var(--transition); text-align: center;
    }
    .emoji-opt:hover { background: var(--glass-border); }

    /* Offline Banner */
    #offline-banner {
      background: #ef4444; color: #000; text-align: center; padding: 0.75rem;
      font-family: var(--mono-font); font-size: 0.9rem; font-weight: 600;
      display: none;
    }
    #offline-banner.visible { display: block; }
  </style>
</head>
<body>
  <div id="offline-banner">Serial port offline — amp commands will fail</div>

  <header>
    <div class="header-title">Home Audio</div>
    <div class="header-actions">
      <button class="btn-icon" id="sources-btn" title="Edit source names">⋮⋮</button>
      <button class="btn-icon" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="bento-grid" id="zone-grid"></div>

  <!-- Emoji picker -->
  <div class="emoji-picker hidden" id="emoji-picker" role="dialog" aria-label="Choose icon"></div>

  <!-- Source names modal -->
  <div class="modal-overlay hidden" id="sources-modal">
    <div class="modal">
      <h2>Source Names</h2>
      <div id="source-inputs"></div>
      <div class="modal-actions">
        <button class="btn-icon" id="sources-cancel">Cancel</button>
        <button class="btn-icon" id="sources-save" style="background: var(--accent); color: white;">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Original JavaScript preserved exactly (use strict, constants, API helpers, init, etc.)
    'use strict';

    const EMOJILIST = ['🎵','🎧','📱','💻','🎤','🎹','🎸','🥁','🎺','🎻','📺','🔥','❌','➕','⭐','🏠','🔈','🔇'];
    const ZONES = [1, 2, 3, 4, 5, 6];
    const POLL_AMP_MS = 30000;
    const POLL_CFG_MS = 60000;
    const VOL_DEBOUNCE_MS = 300;

    let cfg = { theme: 'dark', sourceNames: {}, zones: {} };
    const ampState = {};
    const volTimers = {};

    // API helpers (unchanged)
    async function apiFetch(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || res.statusText);
      }
      return res.json();
    }

    async function patchConfig(slice) {
      try {
        cfg = { ...cfg, ...slice };
        await apiFetch('PATCH', '/api/config', slice);
      } catch (e) {
        console.error('config PATCH failed', e.message);
      }
    }

    // Bootstrap (unchanged logic, but grid class updated)
    async function init() {
      try { cfg = await apiFetch('GET', '/api/config'); } catch (e) {
        console.error('config Load failed, using empty config', e.message);
        cfg = { theme: 'dark', sourceNames: {}, zones: {} };
      }
      applyTheme(cfg.theme);
      renderGrid();
      setupHeader();
      ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200));
      checkHealth();
      setInterval(pollAmpState, POLL_AMP_MS);
      setInterval(pollConfig, POLL_CFG_MS);
    }

    async function pollAmpState() { ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200)); }
    async function pollConfig() {
      try {
        const fresh = await apiFetch('GET', '/api/config');
        const prevTheme = cfg.theme;
        cfg = fresh;
        if (cfg.theme !== prevTheme) {
          applyTheme(cfg.theme);
          rebuildAllDropdowns();
        }
      } catch (e) { console.warn('config Poll failed', e.message); }
    }

    async function checkHealth() {
      try {
        const h = await apiFetch('GET', '/api/health');
        document.getElementById('offline-banner').classList.toggle('visible', !h.serialOpen);
      } catch (e) {}
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const next = cfg.theme === 'dark' ? 'light' : 'dark';
      cfg.theme = next;
      applyTheme(next);
      patchConfig({ theme: next });
    }

    // Grid render: Bento classes added
    function renderGrid() {
      const grid = document.getElementById('zone-grid');
      grid.innerHTML = '';
      ZONES.forEach(z => grid.appendChild(buildCard(z)));
    }

    function buildCard(zone) {
      const zCfg = cfg.zones?.[zone] || { name: `Zone ${zone}`, icon: '🔈' };
      const state = ampState[zone] || { power: false, source: 1, volume: 0 };
      const card = document.createElement('div');
      card.className = `card ${state.power ? 'powered' : ''} bento-${zone % 3 + 1}-${zone % 2 + 1}`;
      card.id = `card-${zone}`;
      card.innerHTML = `
        <div class="card-header">
          <button class="zone-icon-btn" data-zone="${zone}" id="icon-btn-${zone}" title="Change icon">${zCfg.icon}</button>
          <input class="zone-name-input" id="name-${zone}" type="text" value="${escHtml(zCfg.name)}" aria-label="Zone name" maxlength="24">
          <button class="power-btn ${state.power ? 'on' : ''}" data-zone="${zone}" id="power-${zone}" title="Power toggle" aria-pressed="${state.power}"></button>
        </div>
        <select class="zone-source" id="src-${zone}" aria-label="Source">
          ${buildSourceOptions(state.source)}
        </select>
        <div class="vol-row">
          <span class="vol-label">VOL</span>
          <button class="vol-btn" id="vold-${zone}" aria-label="Volume down">−</button>
          <div class="vol-display" id="volnum-${zone}">${state.volume}</div>
          <button class="vol-btn" id="volu-${zone}" aria-label="Volume up">+</button>
        </div>
        <span class="status-chip ${state.power ? 'on' : ''}" id="chip-${zone}">
          ${state.power ? (cfg.sourceNames?.[state.source] || `Source ${state.source}`) : 'Off'}
        </span>
      `;
      // Event listeners (unchanged)
      card.querySelector('#power-' + zone).addEventListener('click', async () => {
        const cur = ampState[zone]?.power ?? false;
        await sendPower(zone, !cur);
      });
      card.querySelector('#icon-btn-' + zone).addEventListener('click', (e) => openEmojiPicker(zone, e.currentTarget));
      const nameInput = card.querySelector('#name-' + zone);
      const saveName = () => {
        const name = nameInput.value.trim() || `Zone ${zone}`;
        if (!cfg.zones) cfg.zones = {};
        if (!cfg.zones[zone]) cfg.zones[zone] = {};
        cfg.zones[zone].name = name;
        patchConfig({ zones: { [zone]: { name } } });
      };
      nameInput.addEventListener('blur', saveName);
      nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') nameInput.blur(); });
      card.querySelector('#src-' + zone).addEventListener('change', async (e) => {
        const src = parseInt(e.target.value, 10);
        await sendSource(zone, src);
      });
      const changeVol = (delta) => {
        const cur = ampState[zone]?.volume ?? 0;
        const next = Math.max(0, Math.min(38, cur + delta));
        ampState[zone].volume = next;
        document.getElementById(`volnum-${zone}`).textContent = next;
        clearTimeout(volTimers[zone]);
        volTimers[zone] = setTimeout(() => sendVolume(zone, next), VOL_DEBOUNCE_MS);
      };
      card.querySelector('#vold-' + zone).addEventListener('click', () => changeVol(-1));
      card.querySelector('#volu-' + zone).addEventListener('click', () => changeVol(1));
      return card;
    }

    function buildSourceOptions(selected) {
      return [1,2,3,4,5,6].map(s => {
        const label = cfg.sourceNames?.[s] || `Source ${s}`;
        return `<option value="${s}" ${selected == s ? 'selected' : ''}>${escHtml(label)}</option>`;
      }).join('');
    }

    function rebuildAllDropdowns() {
      ZONES.forEach(z => {
        const sel = document.getElementById(`src-${z}`);
        if (sel) sel.innerHTML = buildSourceOptions(ampState[z]?.source ?? 1);
        const chip = document.getElementById(`chip-${z}`);
        if (chip && ampState[z]?.power) {
          chip.textContent = cfg.sourceNames?.[ampState[z].source] || `Source ${ampState[z].source}`;
        }
      });
    }

    // Amp state (unchanged)
    async function fetchZoneState(zone) {
      try {
        const s = await apiFetch('GET', `/api/state?zone=${zone}`);
        ampState[zone] = s;
        applyZoneState(zone, s);
      } catch (e) {
        console.warn(`Zone ${zone} state fetch failed`, e.message);
      }
    }

    function applyZoneState(zone, state) {
      ampState[zone] = state;
      const card = document.getElementById(`card-${zone}`);
      if (!card) return;
      card.classList.toggle('powered', state.power);
      const powerBtn = document.getElementById(`power-${zone}`);
      powerBtn.classList.toggle('on', state.power);
      powerBtn.setAttribute('aria-pressed', state.power);
      const srcSel = document.getElementById(`src-${zone}`);
      if (srcSel) srcSel.value = state.source;
      const volNum = document.getElementById(`volnum-${zone}`);
      if (volNum) volNum.textContent = state.volume;
      const chip = document.getElementById(`chip-${zone}`);
      if (chip) {
        chip.className = `status-chip ${state.power ? 'on' : ''}`;
        chip.textContent = state.power ? (cfg.sourceNames?.[state.source] || `Source ${state.source}`) : 'Off';
      }
    }

    // Amp control (unchanged)
    async function sendPower(zone, on) {
      try {
        const r = await apiFetch('POST', `/api/zone${zone}/power`, on);
        applyZoneState(zone, { ...ampState[zone], power: r.power });
      } catch (e) {
        console.error(`Zone ${zone} power error`, e.message);
      }
    }

    async function sendSource(zone, source) {
      try {
        await apiFetch('POST', `/api/zone${zone}/source`, source);
        ampState[zone] = { ...ampState[zone], source };
        const chip = document.getElementById(`chip-${zone}`);
        if (chip && ampState[zone]?.power) {
          chip.textContent = cfg.sourceNames?.[source] || `Source ${source}`;
        }
      } catch (e) {
        console.error(`Zone ${zone} source error`, e.message);
      }
    }

    async function sendVolume(zone, volume) {
      try {
        await apiFetch('POST', `/api/zone${zone}/volume`, volume);
        ampState[zone] = { ...ampState[zone], volume };
      } catch (e) {
        console.error(`Zone ${zone} volume error`, e.message);
      }
    }

    // Emoji picker (minor positioning tweaks for mobile)
    let pickerZone = null;
    const picker = document.getElementById('emoji-picker');
    function openEmojiPicker(zone, anchor) {
      pickerZone = zone;
      picker.innerHTML = EMOJILIST.map(e => `<button class="emoji-opt" data-emoji="${e}">${e}</button>`).join('');
      picker.classList.remove('hidden');
      const rect = anchor.getBoundingClientRect();
      let top = rect.bottom + window.scrollY + 8;
      let left = rect.left + window.scrollX;
      const pw = 260;
      if (left + pw > window.innerWidth) left = window.innerWidth - pw - 16;
      if (top + 200 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 210;
      picker.style.top = top + 'px';
      picker.style.left = left + 'px';
    }
    picker.addEventListener('click', (e) => {
      const btn = e.target.closest('.emoji-opt');
      if (!btn) return;
      const icon = btn.dataset.emoji;
      if (!cfg.zones) cfg.zones = {};
      if (!cfg.zones[pickerZone]) cfg.zones[pickerZone] = {};
      cfg.zones[pickerZone].icon = icon;
      document.getElementById(`icon-btn-${pickerZone}`).textContent = icon;
      patchConfig({ zones: { [pickerZone]: { icon } } });
      picker.classList.add('hidden');
      pickerZone = null;
    });
    document.addEventListener('click', (e) => {
      if (!picker.classList.contains('hidden') && !picker.contains(e.target) && !e.target.closest('.zone-icon-btn')) {
        picker.classList.add('hidden');
        pickerZone = null;
      }
    });

    // Sources modal (minor style tweaks)
    function openSourcesModal() {
      const container = document.getElementById('source-inputs');
      container.innerHTML = [1,2,3,4,5,6].map(s => `
        <div class="vol-row">
          <span class="vol-label">${s}</span>
          <input class="zone-source" id="src-name-${s}" type="text" value="${escHtml(cfg.sourceNames?.[s] || `Source ${s}`)}" maxlength="24">
        </div>
      `).join('');
      document.getElementById('sources-modal').classList.remove('hidden');
      document.getElementById('sources-save').addEventListener('click', () => {
        const names = {};
        [1,2,3,4,5,6].forEach(s => {
          names[s] = document.getElementById(`src-name-${s}`).value.trim() || `Source ${s}`;
        });
        if (!cfg.sourceNames) cfg.sourceNames = {};
        Object.assign(cfg.sourceNames, names);
        rebuildAllDropdowns();
        patchConfig({ sourceNames: names });
        document.getElementById('sources-modal').classList.add('hidden');
      });
      document.getElementById('sources-cancel').addEventListener('click', () => {
        document.getElementById('sources-modal').classList.add('hidden');
      });
    }
    document.getElementById('sources-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('sources-modal')) {
        document.getElementById('sources-modal').classList.add('hidden');
      }
    });

    function setupHeader() {
      document.getElementById('theme-btn').addEventListener('click', toggleTheme);
      document.getElementById('sources-btn').addEventListener('click', openSourcesModal);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Boot
    init();
  </script>
</body>
</html>
