<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>рҹҺө Whole-Home Audio</title>
<style>
/* в”Җв”Җ CSS custom properties (theming) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
:root {
  --bg:          #0f1117;
  --surface:     #1a1d27;
  --surface2:    #22263a;
  --border:      #2e3250;
  --accent:      #6c63ff;
  --accent-glow: #6c63ff44;
  --on-green:    #22c55e;
  --on-glow:     #22c55e33;
  --text:        #e2e8f0;
  --text-muted:  #64748b;
  --radius:      14px;
  --shadow:      0 4px 24px rgba(0,0,0,.4);
  --transition:  .2s ease;
}
[data-theme="light"] {
  --bg:          #f0f4f8;
  --surface:     #ffffff;
  --surface2:    #e8edf3;
  --border:      #cbd5e1;
  --accent:      #4f46e5;
  --accent-glow: #4f46e522;
  --text:        #1e293b;
  --text-muted:  #94a3b8;
  --shadow:      0 4px 24px rgba(0,0,0,.12);
}

/* в”Җв”Җ Reset / base в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* в”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
.header-actions { display: flex; gap: .5rem; }
.btn-icon {
  padding: .45rem .75rem;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: .9rem;
  transition: background var(--transition), box-shadow var(--transition);
}
.btn-icon:hover { background: var(--border); }

/* в”Җв”Җ Zone grid в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
  padding: 1.25rem 1rem;
  max-width: 1200px;
  margin: 0 auto;
}
@media (min-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }

/* в”Җв”Җ Zone card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.2rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: .75rem;
  box-shadow: var(--shadow);
  transition: box-shadow var(--transition);
}
.card.powered {
  border-color: var(--on-green);
  box-shadow: 0 0 0 2px var(--on-glow), var(--shadow);
}

/* card header row */
.card-header {
  display: flex;
  align-items: center;
  gap: .65rem;
}
.zone-icon-btn {
  font-size: 1.65rem;
  line-height: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 2.6rem;
  height: 2.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition);
}
.zone-icon-btn:hover { background: var(--border); }
.zone-name-input {
  flex: 1;
  background: transparent;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  outline: none;
  border-bottom: 2px solid transparent;
  transition: border-color var(--transition);
  padding-bottom: 2px;
}
.zone-name-input:focus { border-bottom-color: var(--accent); }

/* power button */
.power-btn {
  width: 2.2rem;
  height: 2.2rem;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.power-btn.on {
  background: var(--on-green);
  border-color: var(--on-green);
  color: #000;
  box-shadow: 0 0 10px var(--on-glow);
}

/* source select */
.zone-source {
  width: 100%;
  padding: .45rem .65rem;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .9rem;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}
.zone-source:focus { border-color: var(--accent); }

/* volume row */
.vol-row {
  display: flex;
  align-items: center;
  gap: .6rem;
}
.vol-label { font-size: .75rem; color: var(--text-muted); flex-shrink: 0; width: 2.1rem; text-align: right; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--surface2);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  transition: box-shadow var(--transition);
}
input[type=range]::-webkit-slider-thumb:active {
  box-shadow: 0 0 0 6px var(--accent-glow);
}
.vol-num {
  font-size: .8rem;
  font-weight: 700;
  color: var(--accent);
  min-width: 2rem;
  text-align: right;
  flex-shrink: 0;
}

/* status chip */
.status-chip {
  font-size: .75rem;
  padding: .2rem .65rem;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--text-muted);
  display: inline-block;
  width: fit-content;
}
.status-chip.on {
  background: var(--on-glow);
  color: var(--on-green);
  font-weight: 600;
}

/* в”Җв”Җ Emoji picker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.emoji-picker {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: .35rem;
  box-shadow: var(--shadow);
  z-index: 200;
  width: 220px;
}
.emoji-picker.hidden { display: none; }
.emoji-opt {
  font-size: 1.35rem;
  text-align: center;
  padding: .25rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition);
}
.emoji-opt:hover { background: var(--surface2); }

/* в”Җв”Җ Source modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  padding: 1rem;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}
.modal h2 { margin-bottom: 1rem; font-size: 1.1rem; }
.modal-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.modal-row label { font-size: .85rem; color: var(--text-muted); width: 5rem; flex-shrink: 0; }
.modal-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .45rem .65rem;
  color: var(--text);
  font-size: .9rem;
  outline: none;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1rem; }
.btn-primary {
  padding: .5rem 1.2rem;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: .9rem;
  transition: opacity var(--transition);
}
.btn-primary:hover { opacity: .85; }
.btn-secondary {
  padding: .5rem 1.2rem;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: .9rem;
}
.btn-secondary:hover { background: var(--border); }

/* в”Җв”Җ Offline banner в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#offline-banner {
  background: #f59e0b;
  color: #000;
  text-align: center;
  padding: .4rem;
  font-size: .85rem;
  font-weight: 600;
  display: none;
}
#offline-banner.visible { display: block; }
</style>
</head>
<body>

<div id="offline-banner">вҡ пёҸ Serial port offline вҖ“ amp commands will fail</div>

<header>
  <div class="header-title">рҹҺө Whole-Home Audio</div>
  <div class="header-actions">
    <button class="btn-icon" id="sources-btn" title="Edit source names">рҹҺӣ Sources</button>
    <button class="btn-icon" id="theme-btn"   title="Toggle theme">рҹҢҷ</button>
  </div>
</header>

<div class="grid" id="zone-grid"></div>

<!-- Emoji picker (shared, repositioned dynamically) -->
<div class="emoji-picker hidden" id="emoji-picker" role="dialog" aria-label="Choose icon"></div>

<!-- Source names modal -->
<div class="modal-overlay hidden" id="sources-modal">
  <div class="modal">
    <h2>рҹҺӣ Source Names</h2>
    <div id="source-inputs"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="sources-cancel">Cancel</button>
      <button class="btn-primary"   id="sources-save">Save</button>
    </div>
  </div>
</div>

<script>
'use strict';

// в”Җв”Җ Constants в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const EMOJI_LIST = [
  'рҹӣӢпёҸ','рҹҚі','рҹӣҸпёҸ','рҹ’»','рҹҢҝ','рҹҸ ','рҹҺө','рҹ“ә','рҹҺё','рҹҺ№',
  'рҹӣҒ','рҹҸӢпёҸ','рҹҢһ','рҹҢҷ','рҹҚҪпёҸ','рҹ”Ҡ','рҹҺӨ','рҹҸЎ','рҹӣӢпёҸ','рҹҢҠ',
  'рҹҺ®','рҹ“ҡ','рҹҺЁ','рҹҢё','рҹ§‘вҖҚрҹҚі','рҹҚ•','вҳ•','рҹӣә','рҹӘҙ','рҹҺ§'
];
const ZONES       = [1, 2, 3, 4, 5, 6];
const POLL_AMP_MS = 30_000;   // re-poll amp state every 30 s
const POLL_CFG_MS = 60_000;   // re-poll config every 60 s (multi-device sync)
const VOL_DEBOUNCE_MS = 300;  // debounce volume slider

// в”Җв”Җ Module-level state в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let cfg = {};                             // config from server (no localStorage)
const ampState = {};                      // { [zone]: { power, source, volume } }
const volTimers = {};                     // debounce timers per zone

// в”Җв”Җ API helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

/** Send a partial config update to the server and update local cfg. */
async function patchConfig(slice) {
  try {
    cfg = await apiFetch('PATCH', '/api/config', slice);
  } catch (e) {
    console.error('[config] PATCH failed:', e.message);
  }
}

// в”Җв”Җ Bootstrap в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function init() {
  // 1. Load config from server (no localStorage)
  try {
    cfg = await apiFetch('GET', '/api/config');
  } catch (e) {
    console.error('[config] Load failed вҖ“ using empty config:', e.message);
    cfg = { theme: 'dark', sourceNames: {}, zones: {} };
  }
  applyTheme(cfg.theme);

  // 2. Render the full UI from config
  renderGrid();
  setupHeader();

  // 3. Fetch amp state for each zone, staggered 200 ms apart
  ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200));

  // 4. Check serial health
  checkHealth();

  // 5. Periodic polls
  setInterval(pollAmpState, POLL_AMP_MS);
  setInterval(pollConfig,   POLL_CFG_MS);
}

async function pollAmpState() {
  ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200));
}

async function pollConfig() {
  try {
    const fresh = await apiFetch('GET', '/api/config');
    const prevTheme = cfg.theme;
    cfg = fresh;
    if (cfg.theme !== prevTheme) applyTheme(cfg.theme);
    rebuildAllDropdowns();
  } catch (e) { console.warn('[config] Poll failed:', e.message); }
}

async function checkHealth() {
  try {
    const h = await apiFetch('GET', '/api/health');
    document.getElementById('offline-banner').classList.toggle('visible', !h.serialOpen);
  } catch (e) { /* ignore */ }
}

// в”Җв”Җ Theme в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('theme-btn').textContent = theme === 'dark' ? 'рҹҢһ' : 'рҹҢҷ';
}

function toggleTheme() {
  const next = cfg.theme === 'dark' ? 'light' : 'dark';
  cfg.theme = next;
  applyTheme(next);
  patchConfig({ theme: next });
}

// в”Җв”Җ Grid render в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderGrid() {
  const grid = document.getElementById('zone-grid');
  grid.innerHTML = '';
  ZONES.forEach(z => grid.appendChild(buildCard(z)));
}

function buildCard(zone) {
  const zCfg  = (cfg.zones || {})[zone] || { name: `Zone ${zone}`, icon: 'рҹ”Ҡ' };
  const state = ampState[zone] || { power: false, source: 1, volume: 0 };

  const card = document.createElement('div');
  card.className = `card${state.power ? ' powered' : ''}`;
  card.id = `card-${zone}`;

  card.innerHTML = `
    <div class="card-header">
      <button class="zone-icon-btn" data-zone="${zone}" id="icon-btn-${zone}" title="Change icon">${zCfg.icon}</button>
      <input class="zone-name-input" id="name-${zone}" type="text" value="${escHtml(zCfg.name)}"
             aria-label="Zone name" maxlength="24">
      <button class="power-btn${state.power ? ' on' : ''}" data-zone="${zone}" id="power-${zone}"
              title="Power toggle" aria-pressed="${state.power}">вҸ»</button>
    </div>
    <select class="zone-source" id="src-${zone}" aria-label="Source">
      ${buildSourceOptions(state.source)}
    </select>
    <div class="vol-row">
      <span class="vol-label">рҹ”Ҳ</span>
      <input type="range" id="vol-${zone}" min="0" max="38" value="${state.volume}"
             aria-label="Volume">
      <span class="vol-num" id="volnum-${zone}">${state.volume}</span>
    </div>
    <span class="status-chip${state.power ? ' on' : ''}" id="chip-${zone}">
      ${state.power ? 'в–¶ ' + (cfg.sourceNames?.[state.source] || `Source ${state.source}`) : 'Off'}
    </span>
  `;

  // в”Җв”Җ Power button в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  card.querySelector(`#power-${zone}`).addEventListener('click', async () => {
    const cur = ampState[zone]?.power ?? false;
    await sendPower(zone, !cur);
  });

  // в”Җв”Җ Icon picker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  card.querySelector(`#icon-btn-${zone}`).addEventListener('click', e => {
    openEmojiPicker(zone, e.currentTarget);
  });

  // в”Җв”Җ Zone name в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const nameInput = card.querySelector(`#name-${zone}`);
  const saveName = () => {
    const name = nameInput.value.trim() || `Zone ${zone}`;
    if (!cfg.zones) cfg.zones = {};
    if (!cfg.zones[zone]) cfg.zones[zone] = {};
    cfg.zones[zone].name = name;
    patchConfig({ zones: { [zone]: { name } } });
  };
  nameInput.addEventListener('blur',    saveName);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });

  // в”Җв”Җ Source select в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  card.querySelector(`#src-${zone}`).addEventListener('change', async e => {
    const src = parseInt(e.target.value, 10);
    await sendSource(zone, src);
  });

  // в”Җв”Җ Volume slider (debounced) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  card.querySelector(`#vol-${zone}`).addEventListener('input', e => {
    const vol = parseInt(e.target.value, 10);
    document.getElementById(`volnum-${zone}`).textContent = vol;
    clearTimeout(volTimers[zone]);
    volTimers[zone] = setTimeout(() => sendVolume(zone, vol), VOL_DEBOUNCE_MS);
  });

  return card;
}

function buildSourceOptions(selected) {
  return [1,2,3,4,5,6].map(s => {
    const label = cfg.sourceNames?.[s] || `Source ${s}`;
    return `<option value="${s}"${s === selected ? ' selected' : ''}>${escHtml(label)}</option>`;
  }).join('');
}

function rebuildAllDropdowns() {
  ZONES.forEach(z => {
    const sel = document.getElementById(`src-${z}`);
    if (sel) sel.innerHTML = buildSourceOptions(ampState[z]?.source ?? 1);
    const chip = document.getElementById(`chip-${z}`);
    if (chip && ampState[z]?.power) {
      chip.textContent = 'в–¶ ' + (cfg.sourceNames?.[ampState[z].source] || `Source ${ampState[z].source}`);
    }
  });
}

// в”Җв”Җ Amp state fetch / apply в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function fetchZoneState(zone) {
  try {
    const s = await apiFetch('GET', `/api/state?zone=${zone}`);
    ampState[zone] = s;
    applyZoneState(zone, s);
  } catch (e) {
    console.warn(`[zone ${zone}] state fetch failed:`, e.message);
  }
}

function applyZoneState(zone, state) {
  ampState[zone] = state;
  const card     = document.getElementById(`card-${zone}`);
  const powerBtn = document.getElementById(`power-${zone}`);
  const srcSel   = document.getElementById(`src-${zone}`);
  const volSlide = document.getElementById(`vol-${zone}`);
  const volNum   = document.getElementById(`volnum-${zone}`);
  const chip     = document.getElementById(`chip-${zone}`);
  if (!card) return;

  card.classList.toggle('powered', state.power);
  powerBtn.classList.toggle('on', state.power);
  powerBtn.setAttribute('aria-pressed', state.power);

  if (srcSel) srcSel.value = state.source;
  if (volSlide) volSlide.value = state.volume;
  if (volNum)   volNum.textContent = state.volume;

  if (chip) {
    chip.className = `status-chip${state.power ? ' on' : ''}`;
    chip.textContent = state.power
      ? 'в–¶ ' + (cfg.sourceNames?.[state.source] || `Source ${state.source}`)
      : 'Off';
  }
}

// в”Җв”Җ Amp control в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function sendPower(zone, on) {
  try {
    const r = await apiFetch('POST', `/api/zone/${zone}/power`, { on });
    applyZoneState(zone, { ...ampState[zone], power: r.power });
  } catch (e) { console.error(`[zone ${zone}] power error:`, e.message); }
}

async function sendSource(zone, source) {
  try {
    await apiFetch('POST', `/api/zone/${zone}/source`, { source });
    ampState[zone] = { ...ampState[zone], source };
    const chip = document.getElementById(`chip-${zone}`);
    if (chip && ampState[zone]?.power) {
      chip.textContent = 'в–¶ ' + (cfg.sourceNames?.[source] || `Source ${source}`);
    }
  } catch (e) { console.error(`[zone ${zone}] source error:`, e.message); }
}

async function sendVolume(zone, volume) {
  try {
    await apiFetch('POST', `/api/zone/${zone}/volume`, { volume });
    ampState[zone] = { ...ampState[zone], volume };
  } catch (e) { console.error(`[zone ${zone}] volume error:`, e.message); }
}

// в”Җв”Җ Emoji picker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let pickerZone = null;
const picker   = document.getElementById('emoji-picker');

function openEmojiPicker(zone, anchor) {
  pickerZone = zone;
  picker.innerHTML = EMOJI_LIST.map(e =>
    `<button class="emoji-opt" data-emoji="${e}">${e}</button>`
  ).join('');

  picker.classList.remove('hidden');

  const rect = anchor.getBoundingClientRect();
  let top  = rect.bottom + window.scrollY + 6;
  let left = rect.left   + window.scrollX;

  // Keep picker within viewport
  const pw = 220;
  if (left + pw > window.innerWidth) left = window.innerWidth - pw - 8;
  if (top  + 200 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 210;

  picker.style.top  = top  + 'px';
  picker.style.left = left + 'px';
}

picker.addEventListener('click', e => {
  const btn = e.target.closest('.emoji-opt');
  if (!btn || pickerZone === null) return;
  const icon = btn.dataset.emoji;
  if (!cfg.zones) cfg.zones = {};
  if (!cfg.zones[pickerZone]) cfg.zones[pickerZone] = {};
  cfg.zones[pickerZone].icon = icon;
  document.getElementById(`icon-btn-${pickerZone}`).textContent = icon;
  patchConfig({ zones: { [pickerZone]: { icon } } });
  picker.classList.add('hidden');
  pickerZone = null;
});

document.addEventListener('click', e => {
  if (!picker.classList.contains('hidden') &&
      !picker.contains(e.target) &&
      !e.target.closest('.zone-icon-btn')) {
    picker.classList.add('hidden');
    pickerZone = null;
  }
});

// в”Җв”Җ Sources modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openSourcesModal() {
  const container = document.getElementById('source-inputs');
  container.innerHTML = [1,2,3,4,5,6].map(s => `
    <div class="modal-row">
      <label for="src-name-${s}">Source ${s}</label>
      <input class="modal-input" id="src-name-${s}" type="text"
             value="${escHtml(cfg.sourceNames?.[s] || `Source ${s}`)}" maxlength="24">
    </div>
  `).join('');
  document.getElementById('sources-modal').classList.remove('hidden');
}

document.getElementById('sources-save').addEventListener('click', () => {
  const names = {};
  [1,2,3,4,5,6].forEach(s => {
    names[s] = document.getElementById(`src-name-${s}`).value.trim() || `Source ${s}`;
  });
  if (!cfg.sourceNames) cfg.sourceNames = {};
  Object.assign(cfg.sourceNames, names);
  rebuildAllDropdowns();
  patchConfig({ sourceNames: names });
  document.getElementById('sources-modal').classList.add('hidden');
});

document.getElementById('sources-cancel').addEventListener('click', () => {
  document.getElementById('sources-modal').classList.add('hidden');
});

document.getElementById('sources-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('sources-modal')) {
    document.getElementById('sources-modal').classList.add('hidden');
  }
});

// в”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setupHeader() {
  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('sources-btn').addEventListener('click', openSourcesModal);
}

// в”Җв”Җ Util в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// в”Җв”Җ Boot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
init();
</script>
</body>
</html>
