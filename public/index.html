<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎵 Home Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── CSS custom properties (theming) ───────────────────────────────────── */
:root {
  --bg:          #0a0a0f;
  --surface:     rgba(20,25,40,0.6);
  --surface-solid: #141928;
  --surface2:    rgba(40,45,65,0.6);
  --border:      rgba(124,58,237,0.2);
  --border-glow: rgba(124,58,237,0.5);
  --accent:      #7c3aed;
  --accent-glow: rgba(124,58,237,0.4);
  --on-green:    #10b981;
  --on-glow:     rgba(16,185,129,0.3);
  --text:        #f8fafc;
  --text-muted:  #94a3b8;
  --radius:      24px;
  --shadow:      0 8px 32px rgba(0,0,0,.5);
  --transition:  .3s cubic-bezier(0.4, 0, 0.2, 1);
  --font-mono:   'Fira Code', monospace;
}
[data-theme="light"] {
  --bg:          #f1f5f9;
  --surface:     rgba(255,255,255,0.7);
  --surface-solid: #ffffff;
  --surface2:    rgba(226,232,240,0.7);
  --border:      rgba(124,58,237,0.2);
  --border-glow: rgba(124,58,237,0.5);
  --accent:      #6d28d9;
  --text:        #0f172a;
  --text-muted:  #64748b;
  --shadow:      0 8px 32px rgba(0,0,0,.08);
}

/* ── Reset / base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* ── Header ────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-title { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
.header-actions { display: flex; gap: .75rem; }
.btn-icon {
  padding: .6rem .9rem;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 1rem;
  transition: all var(--transition);
  backdrop-filter: blur(10px);
}
.btn-icon:hover { 
  background: var(--accent); 
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}

/* ── Zone grid (Bento Box) ────────────────────────────────────────────────*/
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.25rem;
  padding: 1.5rem;
  max-width: 1200px;
  margin: 0 auto;
}
@media (min-width: 768px) { 
  .grid { 
    grid-template-columns: repeat(2, 1fr); 
    grid-auto-flow: dense;
  } 
  .card:nth-child(1) { grid-column: span 2; }
  .card:nth-child(4) { grid-row: span 2; }
}
@media (min-width: 1024px) { 
  .grid { 
    grid-template-columns: repeat(3, 1fr); 
  }
  .card:nth-child(1) { grid-column: span 2; grid-row: span 2; }
  .card:nth-child(2) { grid-column: span 1; grid-row: span 1; }
  .card:nth-child(3) { grid-column: span 1; grid-row: span 1; }
  .card:nth-child(4) { grid-column: span 2; grid-row: span 1; }
  .card:nth-child(5) { grid-column: span 1; grid-row: span 1; }
}

/* ── Zone card (Glassmorphism) ─────────────────────────────────────────── */
.card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: inherit;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  pointer-events: none;
}
.card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 20px var(--border-glow);
  border-color: var(--accent);
}
.card.powered {
  border-color: var(--on-green);
  box-shadow: 0 0 20px var(--on-glow), var(--shadow);
}
.card.powered::before {
  box-shadow: inset 0 0 0 1px rgba(16,185,129,0.2);
}

/* card header row */
.card-header {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.zone-icon-btn {
  font-size: 2rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 3.5rem;
  height: 3.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
}
.zone-icon-btn:hover { 
  background: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}
.zone-name-input {
  flex: 1;
  background: transparent;
  border: none;
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  outline: none;
  border-bottom: 2px solid transparent;
  transition: border-color var(--transition);
  padding-bottom: 4px;
}
.zone-name-input:focus { border-bottom-color: var(--accent); }

/* power button */
.power-btn {
  width: 3.5rem;
  height: 3.5rem;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 2.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.power-btn.on {
  background: var(--on-green);
  border-color: var(--on-green);
  color: var(--bg);
  box-shadow: 0 0 20px var(--on-glow);
}

/* source select */
.zone-source {
  width: 100%;
  padding: .75rem 1rem;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 1rem;
  outline: none;
  cursor: pointer;
  transition: all var(--transition);
  appearance: none;
  background-image: url('data:image/svg+xml;utf8,<svg fill="%237c3aed" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
  background-repeat: no-repeat;
  background-position: right 10px top 50%;
}
.zone-source:focus, .zone-source:hover { 
  border-color: var(--accent); 
  box-shadow: 0 0 10px var(--accent-glow);
}
.zone-source option {
  background: var(--surface-solid);
  color: var(--text);
}

/* volume row */
.vol-row {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-top: auto;
}
.vol-label { 
  font-family: var(--font-mono);
  font-size: .85rem; 
  color: var(--text-muted); 
  flex-shrink: 0; 
}
.vol-btn {
  width: 3rem;
  height: 3rem;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 1.5rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  user-select: none;
}
.vol-btn:hover { 
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}
.vol-btn:active { transform: scale(0.95); }
.vol-display {
  flex: 1;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .6rem;
  min-width: 3rem;
  box-shadow: inset 0 2px 10px rgba(0,0,0,.2);
}

/* status chip */
.status-chip {
  font-family: var(--font-mono);
  font-size: .85rem;
  padding: .3rem .8rem;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--text-muted);
  display: inline-block;
  width: fit-content;
  border: 1px solid var(--border);
}
.status-chip.on {
  background: var(--on-glow);
  color: var(--on-green);
  border-color: var(--on-green);
  font-weight: 600;
  box-shadow: 0 0 10px var(--on-glow);
}

/* ── Emoji picker ──────────────────────────────────────────────────────── */
.emoji-picker {
  position: fixed;
  background: var(--surface);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: .5rem;
  box-shadow: 0 10px 40px rgba(0,0,0,.8), 0 0 20px var(--border-glow);
  z-index: 200;
  width: 280px;
}
.emoji-picker.hidden { display: none; }
.emoji-opt {
  font-size: 1.6rem;
  text-align: center;
  padding: .4rem;
  border-radius: 12px;
  cursor: pointer;
  transition: all var(--transition);
}
.emoji-opt:hover { 
  background: var(--accent); 
  transform: scale(1.1);
}

/* ── Source modal ──────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,10,15,.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  padding: 1rem;
  transition: opacity var(--transition);
}
.modal-overlay.hidden { display: none; opacity: 0; }
.modal {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 2rem;
  width: 100%;
  max-width: 450px;
  box-shadow: 0 20px 50px rgba(0,0,0,.8), 0 0 30px var(--accent-glow);
}
.modal h2 { margin-bottom: 1.5rem; font-size: 1.4rem; font-family: var(--font-mono); }
.modal-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.modal-row label { font-family: var(--font-mono); font-size: .9rem; color: var(--text-muted); width: 5.5rem; flex-shrink: 0; }
.modal-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .6rem .8rem;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 1rem;
  outline: none;
  transition: all var(--transition);
}
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
.modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
.btn-primary {
  padding: .7rem 1.5rem;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-family: var(--font-mono);
  font-size: 1rem;
  transition: all var(--transition);
  box-shadow: 0 0 15px var(--accent-glow);
}
.btn-primary:hover { opacity: .9; transform: translateY(-2px); }
.btn-secondary {
  padding: .7rem 1.5rem;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 1rem;
  transition: all var(--transition);
}
.btn-secondary:hover { background: var(--border); }

/* ── Offline banner ────────────────────────────────────────────────────── */
#offline-banner {
  background: rgba(245, 158, 11, 0.9);
  color: #000;
  text-align: center;
  padding: .6rem;
  font-family: var(--font-mono);
  font-size: .9rem;
  font-weight: 700;
  display: none;
  backdrop-filter: blur(10px);
}
#offline-banner.visible { display: block; }
</style>
</head>
<body>

<div id="offline-banner">⚠️ Serial port offline – amp commands will fail</div>

<header>
  <div class="header-title">🎵 Home Audio</div>
  <div class="header-actions">
    <button class="btn-icon" id="sources-btn" title="Edit source names">🎛 Sources</button>
    <button class="btn-icon" id="theme-btn"   title="Toggle theme">🌙</button>
  </div>
</header>

<div class="grid" id="zone-grid"></div>

<!-- Emoji picker (shared, repositioned dynamically) -->
<div class="emoji-picker hidden" id="emoji-picker" role="dialog" aria-label="Choose icon"></div>

<!-- Source names modal -->
<div class="modal-overlay hidden" id="sources-modal">
  <div class="modal">
    <h2>🎛 Source Names</h2>
    <div id="source-inputs"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="sources-cancel">Cancel</button>
      <button class="btn-primary"   id="sources-save">Save</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Constants ───────────────────────────────────────────────────────────────
const EMOJI_LIST = [
  '🏠','🍳','🛏️','🚿','💼','🚗','🛋️','💻','🌿','🎵',
  '📺','🎸','🎹','🛁','🏋️','🌞','🌙','🍽️','🔊','🎤',
  '🏡','🌊','🎮','📚','🎨','🌸','🧑‍🍳','🍕','☕','🛺','🪴','🎧'
];
const ZONES       = [1, 2, 3, 4, 5, 6];
const POLL_AMP_MS = 30_000;   // re-poll amp state every 30 s
const POLL_CFG_MS = 60_000;   // re-poll config every 60 s (multi-device sync)
const VOL_DEBOUNCE_MS = 300;  // debounce volume slider

// ── Module-level state ──────────────────────────────────────────────────────
let cfg = {};                             // config from server (no localStorage)
const ampState = {};                      // { [zone]: { power, source, volume } }
const volTimers = {};                     // debounce timers per zone

// ── API helpers ─────────────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

/** Send a partial config update to the server and update local cfg. */
async function patchConfig(slice) {
  try {
    cfg = await apiFetch('PATCH', '/api/config', slice);
  } catch (e) {
    console.error('[config] PATCH failed:', e.message);
  }
}

// ── Bootstrap ───────────────────────────────────────────────────────────────
async function init() {
  // 1. Load config from server (no localStorage)
  try {
    cfg = await apiFetch('GET', '/api/config');
  } catch (e) {
    console.error('[config] Load failed – using empty config:', e.message);
    cfg = { theme: 'dark', sourceNames: {}, zones: {} };
  }
  applyTheme(cfg.theme);

  // 2. Render the full UI from config
  renderGrid();
  setupHeader();

  // 3. Fetch amp state for each zone, staggered 200 ms apart
  ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200));

  // 4. Check serial health
  checkHealth();

  // 5. Periodic polls
  setInterval(pollAmpState, POLL_AMP_MS);
  setInterval(pollConfig,   POLL_CFG_MS);
}

async function pollAmpState() {
  ZONES.forEach((z, i) => setTimeout(() => fetchZoneState(z), i * 200));
}

async function pollConfig() {
  try {
    const fresh = await apiFetch('GET', '/api/config');
    const prevTheme = cfg.theme;
    cfg = fresh;
    if (cfg.theme !== prevTheme) applyTheme(cfg.theme);
    rebuildAllDropdowns();
  } catch (e) { console.warn('[config] Poll failed:', e.message); }
}

async function checkHealth() {
  try {
    const h = await apiFetch('GET', '/api/health');
    document.getElementById('offline-banner').classList.toggle('visible', !h.serialOpen);
  } catch (e) { /* ignore */ }
}

// ── Theme ────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '🌞' : '🌙';
}

function toggleTheme() {
  const next = cfg.theme === 'dark' ? 'light' : 'dark';
  cfg.theme = next;
  applyTheme(next);
  patchConfig({ theme: next });
}

// ── Grid render ──────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('zone-grid');
  grid.innerHTML = '';
  ZONES.forEach(z => grid.appendChild(buildCard(z)));
}

function buildCard(zone) {
  const defaults = {
    1: { name: 'Living', icon: '🏠' },
    2: { name: 'Kitchen', icon: '🍳' },
    3: { name: 'Bedroom', icon: '🛏️' },
    4: { name: 'Bathroom', icon: '🚿' },
    5: { name: 'Office', icon: '💼' },
    6: { name: 'Garage', icon: '🚗' }
  };
  const def = defaults[zone] || { name: `Zone ${zone}`, icon: '🔊' };
  const zCfg  = (cfg.zones || {})[zone] || def;
  const state = ampState[zone] || { power: false, source: 1, volume: 0 };

  const card = document.createElement('div');
  card.className = `card${state.power ? ' powered' : ''}`;
  card.id = `card-${zone}`;

  card.innerHTML = `
    <div class="card-header">
      <button class="zone-icon-btn" data-zone="${zone}" id="icon-btn-${zone}" title="Change icon">${zCfg.icon}</button>
      <input class="zone-name-input" id="name-${zone}" type="text" value="${escHtml(zCfg.name)}"
             aria-label="Zone name" maxlength="24">
      <button class="power-btn${state.power ? ' on' : ''}" data-zone="${zone}" id="power-${zone}"
              title="Power toggle" aria-pressed="${state.power}">${state.power ? '⏽' : '⏻'}</button>
    </div>
    <select class="zone-source" id="src-${zone}" aria-label="Source">
      ${buildSourceOptions(state.source)}
    </select>
    <div class="vol-row">
      <span class="vol-label">VOL</span>
      <button class="vol-btn" id="vold-${zone}" aria-label="Volume down">−</button>
      <div class="vol-display" id="volnum-${zone}">${state.volume}</div>
      <button class="vol-btn" id="volu-${zone}" aria-label="Volume up">+</button>
    </div>
    <span class="status-chip${state.power ? ' on' : ''}" id="chip-${zone}">
      ${state.power ? '▶ ' + (cfg.sourceNames?.[state.source] || `Source ${state.source}`) : 'Off'}
    </span>
  `;

  // ── Power button ─────────────────────────────────────────────────────────
  card.querySelector(`#power-${zone}`).addEventListener('click', async () => {
    const cur = ampState[zone]?.power ?? false;
    await sendPower(zone, !cur);
  });

  // ── Icon picker ───────────────────────────────────────────────────────────
  card.querySelector(`#icon-btn-${zone}`).addEventListener('click', e => {
    openEmojiPicker(zone, e.currentTarget);
  });

  // ── Zone name ─────────────────────────────────────────────────────────────
  const nameInput = card.querySelector(`#name-${zone}`);
  const saveName = () => {
    const name = nameInput.value.trim() || def.name;
    if (!cfg.zones) cfg.zones = {};
    if (!cfg.zones[zone]) cfg.zones[zone] = {};
    cfg.zones[zone].name = name;
    patchConfig({ zones: { [zone]: { name } } });
  };
  nameInput.addEventListener('blur',    saveName);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });

  // ── Source select ─────────────────────────────────────────────────────────
  card.querySelector(`#src-${zone}`).addEventListener('change', async e => {
    const src = parseInt(e.target.value, 10);
    await sendSource(zone, src);
  });

  // ── Volume slider (debounced) ─────────────────────────────────────────────
  function changeVol(zone, delta) {
    const cur = ampState[zone]?.volume ?? 0;
    const next = Math.max(0, Math.min(38, cur + delta));
    ampState[zone].volume = next;
    document.getElementById(`volnum-${zone}`).textContent = next;
    clearTimeout(volTimers[zone]);
    volTimers[zone] = setTimeout(() => sendVolume(zone, next), VOL_DEBOUNCE_MS);
  }
  card.querySelector(`#vold-${zone}`).addEventListener('click', () => changeVol(zone, -1));
  card.querySelector(`#volu-${zone}`).addEventListener('click', () => changeVol(zone, +1));

  return card;
}

function buildSourceOptions(selected) {
  return [1,2,3,4,5,6].map(s => {
    const label = cfg.sourceNames?.[s] || `Source ${s}`;
    return `<option value="${s}"${s === selected ? ' selected' : ''}>${escHtml(label)}</option>`;
  }).join('');
}

function rebuildAllDropdowns() {
  ZONES.forEach(z => {
    const sel = document.getElementById(`src-${z}`);
    if (sel) sel.innerHTML = buildSourceOptions(ampState[z]?.source ?? 1);
    const chip = document.getElementById(`chip-${z}`);
    if (chip && ampState[z]?.power) {
      chip.textContent = '▶ ' + (cfg.sourceNames?.[ampState[z].source] || `Source ${ampState[z].source}`);
    }
  });
}

// ── Amp state fetch / apply ──────────────────────────────────────────────────
async function fetchZoneState(zone) {
  try {
    const s = await apiFetch('GET', `/api/state?zone=${zone}`);
    ampState[zone] = s;
    applyZoneState(zone, s);
  } catch (e) {
    console.warn(`[zone ${zone}] state fetch failed:`, e.message);
  }
}

function applyZoneState(zone, state) {
  ampState[zone] = state;
  const card     = document.getElementById(`card-${zone}`);
  const powerBtn = document.getElementById(`power-${zone}`);
  const srcSel   = document.getElementById(`src-${zone}`);
  const volSlide = document.getElementById(`vol-${zone}`);
  const volNum   = document.getElementById(`volnum-${zone}`);
  const chip     = document.getElementById(`chip-${zone}`);
  if (!card) return;

  card.classList.toggle('powered', state.power);
  powerBtn.classList.toggle('on', state.power);
  powerBtn.setAttribute('aria-pressed', state.power);
  powerBtn.textContent = state.power ? '⏽' : '⏻';

  if (srcSel) srcSel.value = state.source;
  if (volSlide) volSlide.value = state.volume;
  if (volNum)   volNum.textContent = state.volume;

  if (chip) {
    chip.className = `status-chip${state.power ? ' on' : ''}`;
    chip.textContent = state.power
      ? '▶ ' + (cfg.sourceNames?.[state.source] || `Source ${state.source}`)
      : 'Off';
  }
}

// ── Amp control ──────────────────────────────────────────────────────────────
async function sendPower(zone, on) {
  try {
    const r = await apiFetch('POST', `/api/zone/${zone}/power`, { on });
    applyZoneState(zone, { ...ampState[zone], power: r.power });
  } catch (e) { console.error(`[zone ${zone}] power error:`, e.message); }
}

async function sendSource(zone, source) {
  try {
    await apiFetch('POST', `/api/zone/${zone}/source`, { source });
    ampState[zone] = { ...ampState[zone], source };
    const chip = document.getElementById(`chip-${zone}`);
    if (chip && ampState[zone]?.power) {
      chip.textContent = '▶ ' + (cfg.sourceNames?.[source] || `Source ${source}`);
    }
  } catch (e) { console.error(`[zone ${zone}] source error:`, e.message); }
}

async function sendVolume(zone, volume) {
  try {
    await apiFetch('POST', `/api/zone/${zone}/volume`, { volume });
    ampState[zone] = { ...ampState[zone], volume };
  } catch (e) { console.error(`[zone ${zone}] volume error:`, e.message); }
}

// ── Emoji picker ─────────────────────────────────────────────────────────────
let pickerZone = null;
const picker   = document.getElementById('emoji-picker');

function openEmojiPicker(zone, anchor) {
  pickerZone = zone;
  picker.innerHTML = EMOJI_LIST.map(e =>
    `<button class="emoji-opt" data-emoji="${e}">${e}</button>`
  ).join('');

  picker.classList.remove('hidden');

  const rect = anchor.getBoundingClientRect();
  let top  = rect.bottom + window.scrollY + 6;
  let left = rect.left   + window.scrollX;

  // Keep picker within viewport
  const pw = 280;
  if (left + pw > window.innerWidth) left = window.innerWidth - pw - 8;
  if (top  + 200 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 210;

  picker.style.top  = top  + 'px';
  picker.style.left = left + 'px';
}

picker.addEventListener('click', e => {
  const btn = e.target.closest('.emoji-opt');
  if (!btn || pickerZone === null) return;
  const icon = btn.dataset.emoji;
  if (!cfg.zones) cfg.zones = {};
  if (!cfg.zones[pickerZone]) cfg.zones[pickerZone] = {};
  cfg.zones[pickerZone].icon = icon;
  document.getElementById(`icon-btn-${pickerZone}`).textContent = icon;
  patchConfig({ zones: { [pickerZone]: { icon } } });
  picker.classList.add('hidden');
  pickerZone = null;
});

document.addEventListener('click', e => {
  if (!picker.classList.contains('hidden') &&
      !picker.contains(e.target) &&
      !e.target.closest('.zone-icon-btn')) {
    picker.classList.add('hidden');
    pickerZone = null;
  }
});

// ── Sources modal ─────────────────────────────────────────────────────────────
function openSourcesModal() {
  const container = document.getElementById('source-inputs');
  container.innerHTML = [1,2,3,4,5,6].map(s => `
    <div class="modal-row">
      <label for="src-name-${s}">Source ${s}</label>
      <input class="modal-input" id="src-name-${s}" type="text"
             value="${escHtml(cfg.sourceNames?.[s] || `Source ${s}`)}" maxlength="24">
    </div>
  `).join('');
  document.getElementById('sources-modal').classList.remove('hidden');
}

document.getElementById('sources-save').addEventListener('click', () => {
  const names = {};
  [1,2,3,4,5,6].forEach(s => {
    names[s] = document.getElementById(`src-name-${s}`).value.trim() || `Source ${s}`;
  });
  if (!cfg.sourceNames) cfg.sourceNames = {};
  Object.assign(cfg.sourceNames, names);
  rebuildAllDropdowns();
  patchConfig({ sourceNames: names });
  document.getElementById('sources-modal').classList.add('hidden');
});

document.getElementById('sources-cancel').addEventListener('click', () => {
  document.getElementById('sources-modal').classList.add('hidden');
});

document.getElementById('sources-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('sources-modal')) {
    document.getElementById('sources-modal').classList.add('hidden');
  }
});

// ── Header ────────────────────────────────────────────────────────────────────
function setupHeader() {
  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('sources-btn').addEventListener('click', openSourcesModal);
}

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
